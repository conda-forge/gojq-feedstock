schema_version: 1

context:
  version: "0.12.19"

package:
  name: gojq
  version: ${{ version }}

source:
  url: https://github.com/itchyny/gojq/archive/refs/tags/v${{ version }}.tar.gz
  sha256: d6c6ecf8b7d9ed892216aee61101e8bc45359dc63d5ba3ab596922c4ea11e1ab

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - gojq --help

about:
  license: MIT
  license_file:
    - LICENSE
    - license-files/
  summary: Pure Go implementation of jq
  homepage: https://github.com/itchyny/gojq
  repository: https://github.com/itchyny/gojq

extra:
  recipe-maintainers:
    - danielnachun
